<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Recupera Empresas</title>
  <link rel="stylesheet" href="../design-system/tokens/core-v2.css">
  <link rel="stylesheet" href="../design-system/components/base-v2.css">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--ds-color-bg); }
    .login-container { width: 100%; max-width: 400px; padding: 2rem; }
    .hidden { display: none; }
    .error-msg { color: var(--ds-color-error); font-size: 0.875rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="ds-card ds-card--elevated ds-card--md ds-card--pad-md">
      <h1 class="ds-text-xl ds-font-bold ds-text-center ds-mb-lg">Acesso ao Portal</h1>
      
      <form id="loginForm">
        <div class="ds-form-group ds-mb-md">
          <label for="email" class="ds-label">E-mail</label>
          <input type="email" id="email" class="ds-input" required placeholder="seu@email.com">
        </div>
        
        <div class="ds-form-group ds-mb-lg">
          <label for="password" class="ds-label">Senha</label>
          <input type="password" id="password" class="ds-input" required placeholder="••••••••">
        </div>

        <div id="errorMsg" class="error-msg hidden"></div>

        <button type="submit" id="submitBtn" class="ds-btn ds-btn-primary ds-btn-block">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/auth-manager.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await window.AuthManager.init();

      // Se já estiver logado, redireciona
      if (window.AuthManager.currentUser) {
        window.location.href = '/portal.hermidamaia.adv.br'; // Ou caminho relativo correto
        return;
      }

      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Autenticando...';
        errorMsg.classList.add('hidden');

        try {
          await window.AuthManager.login(email, password);
          
          // Redirecionamento baseado no perfil
          if (window.AuthManager.isAdmin()) {
            window.location.href = '/admin/index.html'; // Admin Shell
          } else {
            window.location.href = '/client/index.html'; // Client Shell
          }
        } catch (err) {
          errorMsg.textContent = err.message || 'Erro ao fazer login. Verifique suas credenciais.';
          errorMsg.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Entrar';
        }
      });
    });
  </script>
</body>
</html>
