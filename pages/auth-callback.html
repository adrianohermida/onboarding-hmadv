<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verificando acesso — Hermida Maia Advocacia</title>
<link rel="stylesheet" href="../styles/variables.css?v=20260523k">
<link rel="stylesheet" href="../styles/main.css?v=20260523k">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .cb-card {
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--r-lg);
    padding:48px 44px;
    max-width:380px;
    width:100%;
    text-align:center;
    box-shadow:var(--shadow-md);
    animation: fadeUp .4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .cb-logo {
    width:52px;height:52px;
    border-radius:14px;
    background:linear-gradient(135deg,var(--navy),var(--blue));
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;
  }
  .cb-brand { font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--navy);margin-bottom:6px; }
  .cb-brand span { color:var(--brand-gold); }
  .spinner { width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;margin:20px auto 10px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .cb-msg { font-size:13px;color:var(--muted); }
  .cb-error { color:var(--red);font-size:13px;margin-top:16px;display:none; }
</style>
</head>
<body>
<div class="cb-card">
  <div style="margin:0 auto 12px;text-align:center;">
    <img src="../assets/logo2.webp"
         alt="Hermida Maia Advocacia"
         onerror="this.style.display='none'"
         style="width:64px;height:auto;border-radius:12px;">
  </div>
  <div class="cb-brand">HERMIDA<span> MAIA</span></div>

  <div id="state-loading">
    <div class="spinner"></div>
    <div class="cb-msg" id="cb-msg">Verificando seu acesso...</div>
  </div>

  <div id="state-success" style="display:none;">
    <div style="font-size:28px;margin:16px 0;">OK</div>
    <div class="cb-msg">Acesso confirmado. Redirecionando...</div>
  </div>

  <div id="state-error" style="display:none;">
    <div style="font-size:28px;margin:16px 0;">ERRO</div>
    <p class="cb-error" id="error-msg" style="display:block;">Link inválido ou expirado.</p>
    <a href="login.html" style="display:inline-block;margin-top:16px;font-size:13px;color:var(--blue);">
      Solicitar novo link
    </a>
  </div>
</div>

<script src="../js/runtime-config.js"></script>
<script>
function getAuthApiBase() {
  return (
    (window.__HM_AUTH__ && window.__HM_AUTH__.baseUrl) ||
    (window.__HM_SUPABASE__ && window.__HM_SUPABASE__.authApiBaseUrl) ||
    localStorage.getItem('HM_AUTH_API_BASE') ||
    (window.location.hostname === 'portal.hermidamaia.adv.br' ? 'https://api.hermidamaia.adv.br' : '')
  );
}

function authUrl(path) {
  const base = String(getAuthApiBase() || '').trim().replace(/\/$/, '');
  if (!base) return path;
  return `${base}${path}`;
}

function getLegacySupabaseConfig() {
  const cfg = window.__HM_SUPABASE__ || {};
  return {
    url: String(cfg.defaultUrl || '').trim(),
    anonKey: String(cfg.defaultKey || '').trim(),
  };
}

async function resolveLegacyRole(cfg, accessToken, userId) {
  if (!cfg.url || !cfg.anonKey || !accessToken || !userId) {
    return null;
  }

  const url = new URL(`${cfg.url.replace(/\/$/, '')}/rest/v1/admin_users`);
  url.searchParams.set('select', 'role');
  url.searchParams.set('user_id', `eq.${userId}`);
  url.searchParams.set('limit', '1');

  const response = await fetch(url.toString(), {
    method: 'GET',
    headers: {
      apikey: cfg.anonKey,
      Authorization: `Bearer ${accessToken}`,
    },
  });

  let payload = [];
  try {
    payload = await response.json();
  } catch (_) {
    payload = [];
  }

  if (!response.ok || !Array.isArray(payload) || !payload[0] || !payload[0].role) {
    return null;
  }

  return String(payload[0].role);
}

async function handleLegacyFallback(payload) {
  const cfg = getLegacySupabaseConfig();
  if (!cfg.url || !cfg.anonKey) {
    throw new Error('Serviço de autenticação temporariamente indisponível.');
  }

  const accessToken = String(payload.access_token || '').trim();
  const refreshToken = String(payload.refresh_token || '').trim();
  if (!accessToken || !refreshToken) {
    throw new Error('Link inválido ou expirado.');
  }

  const userResponse = await fetch(`${cfg.url.replace(/\/$/, '')}/auth/v1/user`, {
    method: 'GET',
    headers: {
      apikey: cfg.anonKey,
      Authorization: `Bearer ${accessToken}`,
    },
  });

  const userPayload = await userResponse.json();
  if (!userResponse.ok || !userPayload.user) {
    throw new Error(userPayload.error_description || userPayload.msg || userPayload.error || 'Link inválido ou expirado.');
  }

  const role = await resolveLegacyRole(cfg, accessToken, String(userPayload.user.id || ''));

  try {
    localStorage.setItem('hm_legacy_access_token', accessToken);
    localStorage.setItem('hm_legacy_refresh_token', refreshToken);
    localStorage.setItem('hm_legacy_user', JSON.stringify(userPayload.user));
    if (role) {
      localStorage.setItem('hm_legacy_role', role);
    }
  } catch (_) {}

  return {
    ok: true,
    user: userPayload.user,
    role,
  };
}

function setState(id) {
  ['state-loading','state-success','state-error'].forEach(s => {
    document.getElementById(s).style.display = s === id ? '' : 'none';
  });
}

async function handleCallback() {
  try {
    const hashParams = new URLSearchParams((window.location.hash || '').replace(/^#/, ''));
    const queryParams = new URLSearchParams(window.location.search || '');

    const accessToken = hashParams.get('access_token') || '';
    const refreshToken = hashParams.get('refresh_token') || '';
    const tokenHash = queryParams.get('token_hash') || '';
    const type = queryParams.get('type') || hashParams.get('type') || 'magiclink';
    const isRecovery = String(type).toLowerCase() === 'recovery';

    const response = await fetch(authUrl('/api/auth/callback'), {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        access_token: accessToken,
        refresh_token: refreshToken,
        token_hash: tokenHash,
        type,
      }),
    });

    let payload = await response.json();
    if (!response.ok || payload.ok === false || !payload.user) {
      const fallbackPayload = await handleLegacyFallback({ access_token: accessToken, refresh_token: refreshToken });
      payload = fallbackPayload;
    }

    setState('state-success');
    if (isRecovery) {
      setTimeout(() => { window.location.replace('login.html?mode=recovery'); }, 900);
      return;
    }

    const nextPath = payload.role ? 'admin/index.html' : 'pages/dashboard.html';
    setTimeout(() => { window.location.replace(`../${nextPath}`); }, 1200);

  } catch (err) {
    document.getElementById('error-msg').textContent = err.message || 'Erro ao verificar acesso.';
    setState('state-error');
  }
}

handleCallback();
</script>
</body>
</html>
