<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Verificando acesso — Hermida Maia Advocacia</title>
<link rel="stylesheet" href="../styles/variables.css?v=20260523k">
<link rel="stylesheet" href="../styles/main.css?v=20260523k">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .cb-card {
    background:#fff;
    border:1px solid var(--line);
    border-radius:var(--r-lg);
    padding:48px 44px;
    max-width:380px;
    width:100%;
    text-align:center;
    box-shadow:var(--shadow-md);
    animation: fadeUp .4s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  .cb-logo {
    width:52px;height:52px;
    border-radius:14px;
    background:linear-gradient(135deg,var(--navy),var(--blue));
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 16px;
  }
  .cb-brand { font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:2px;color:var(--navy);margin-bottom:6px; }
  .cb-brand span { color:var(--brand-gold); }
  .spinner { width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:spin .75s linear infinite;margin:20px auto 10px; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .cb-msg { font-size:13px;color:var(--muted); }
  .cb-error { color:var(--red);font-size:13px;margin-top:16px;display:none; }
</style>
</head>
<body>
<div class="cb-card">
  <div style="margin:0 auto 12px;text-align:center;">
    <img src="../assets/logo2.webp"
         alt="Hermida Maia Advocacia"
         onerror="this.style.display='none'"
         style="width:64px;height:auto;border-radius:12px;">
  </div>
  <div class="cb-brand">HERMIDA<span> MAIA</span></div>

  <div id="state-loading">
    <div class="spinner"></div>
    <div class="cb-msg" id="cb-msg">Verificando seu acesso...</div>
  </div>

  <div id="state-success" style="display:none;">
    <div style="font-size:28px;margin:16px 0;">OK</div>
    <div class="cb-msg">Acesso confirmado. Redirecionando...</div>
  </div>

  <div id="state-error" style="display:none;">
    <div style="font-size:28px;margin:16px 0;">ERRO</div>
    <p class="cb-error" id="error-msg" style="display:block;">Link inválido ou expirado.</p>
    <a href="login.html" style="display:inline-block;margin-top:16px;font-size:13px;color:var(--blue);">
      Solicitar novo link
    </a>
  </div>
</div>

<script type="module">
import { supabase }    from '../services/supabase.js';
import { AuthService } from '../services/auth.js';

function setState(id) {
  ['state-loading','state-success','state-error'].forEach(s => {
    document.getElementById(s).style.display = s === id ? '' : 'none';
  });
}

async function handleCallback() {
  /* Supabase v2 processes URL hash/session automatically on init. */
  try {
    const { data, error } = await supabase.auth.getSession();

    if (error) throw error;

    const hash = window.location.hash || '';
    const isRecovery = hash.includes('type=recovery');

    if (data?.session) {
      setState('state-success');
      if (isRecovery) {
        setTimeout(() => { window.location.replace('login.html?mode=recovery'); }, 900);
        return;
      }

      const { data: adminData } = await supabase
        .from('admin_users')
        .select('role')
        .eq('user_id', data.session.user.id)
        .maybeSingle();

      const nextPath = adminData ? 'admin/index.html' : 'pages/dashboard.html';
      setTimeout(() => { window.location.replace(`../${nextPath}`); }, 1200);
      return;
    }

    /* Hash may still contain tokens — listen for one tick */
    const { data: { subscription } } = supabase.auth.onAuthStateChange((event, session) => {
      subscription.unsubscribe();
      if (session) {
        setState('state-success');
        if (isRecovery) {
          setTimeout(() => { window.location.replace('login.html?mode=recovery'); }, 900);
          return;
        }

        setTimeout(() => { window.location.replace('../pages/dashboard.html'); }, 1200);
      } else {
        setState('state-error');
      }
    });

    /* Fallback timeout */
    setTimeout(() => setState('state-error'), 8000);

  } catch (err) {
    document.getElementById('error-msg').textContent = err.message || 'Erro ao verificar acesso.';
    setState('state-error');
  }
}

handleCallback();
</script>
</body>
</html>
