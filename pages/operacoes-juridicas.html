<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Operações Jurídicas | Hermida Maia Advocacia</title>
  <link rel="stylesheet" href="../styles/variables.css?v=20260523a" />

<body>
  <div class="portal-shell">
    <div data-component="sidebar"></div>
    <div class="main-area">

          <div class="kpi"><span class="kpi-label">Timeline</span><div class="kpi-value">Ativa</div><div class="kpi-hint">Eventos do caso</div></div>
          <div class="kpi"><span class="kpi-label">Prazos</span><div class="kpi-value">Em dia</div><div class="kpi-hint">Acompanhamento</div></div>
          <div class="kpi kpi-ok"><span class="kpi-label">Tarefas</span><div class="kpi-value">Visíveis</div><div class="kpi-hint">Equipe e prioridades</div></div>

      </main>
    </div>
  </div>
