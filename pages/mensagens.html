<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mensagens — Hermida Maia Advocacia</title>
<link rel="stylesheet" href="../styles/variables.css?v=20260523d">
<link rel="stylesheet" href="../styles/main.css?v=20260523d">
<link rel="stylesheet" href="../styles/layout.css?v=20260523d">
<link rel="stylesheet" href="../styles/components.css?v=20260523d">
</head>
<body>
<div class="portal-shell">
  <div data-component="sidebar"></div>
  <div class="main-area">
    <div data-component="header"></div>
    <main class="page-content">
      <div data-cliente-module-host></div>
      <div data-advogado-module-host></div>
    </main>
  </div>
</div>
<script type="module" src="../js/app.js?v=20260523d"></script>
<script type="module">
  import { checkIsAdmin } from '../services/database.js';
  import { bootAdvogadoPage } from '../modules/advogado/PortalAdvogadoPage.js?v=20260523d';
  import { bootClientePage } from '../modules/cliente/PortalClientePage.js?v=20260523d';

  document.addEventListener('app:ready', async () => {
    const isAdmin = await checkIsAdmin().catch(() => false);
    const clientHost = document.querySelector('[data-cliente-module-host]');
    const adminHost = document.querySelector('[data-advogado-module-host]');
    if (isAdmin) {
      if (clientHost) clientHost.remove();
      bootAdvogadoPage('mensagens');
      return;
    }
    if (adminHost) adminHost.remove();
    bootClientePage('mensagens');
  }, { once: true });
</script>
</body>
</html>
