<!--
  Status Card — componente reutilizável.
  Uso via JS: document.querySelector('[data-component="status-card"]')
  Ou instanciado programaticamente pelo app.js com dados do caso.

  Estrutura esperada dos dados:
  {
    icon: '📄',          // emoji ou SVG string
    iconBg: 'bg-blue',   // bg-blue | bg-ok | bg-warn | bg-red | bg-gold
    label: 'Documentos',
    value: '3 / 7',
    hint:  'aguardando aprovação'
  }
-->
<div class="status-card" data-card-id="">
  <div class="status-card-icon icon-bg-blue" data-card-icon>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect x="3" y="2" width="10" height="16" rx="1.5" stroke="#2E6DA4" stroke-width="1.5"/>
      <path d="M13 2l4 4v12a1 1 0 01-1 1h-3" stroke="#2E6DA4" stroke-width="1.5"/>
      <path d="M6 8h7M6 11h5" stroke="#2E6DA4" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="status-card-body">
    <div class="status-card-label" data-card-label>Status</div>
    <div class="status-card-value" data-card-value>—</div>
    <div class="status-card-hint"  data-card-hint></div>
  </div>
</div>
