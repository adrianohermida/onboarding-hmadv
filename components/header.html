<header class="portal-header" role="banner">
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu"
          style="display:none;background:none;border:none;cursor:pointer;padding:6px;margin-right:8px;color:var(--ink2);">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>

  <div class="header-breadcrumb" id="header-breadcrumb" aria-label="Navegação">
    <strong id="header-page-title">Portal</strong>
  </div>

  <div class="header-actions">
    <div class="header-user" id="header-user" title="Usuário autenticado">
      <div class="header-avatar" id="header-avatar" aria-hidden="true">HM</div>
      <span id="header-user-name"
            style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:none;">—</span>
    </div>
  </div>
</header>
