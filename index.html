<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portal do Cliente — Hermida Maia Advocacia</title>
<meta name="description" content="Portal exclusivo do cliente — Hermida Maia Sociedade Individual de Advocacia">
<link rel="stylesheet" href="styles/variables.css">
<link rel="stylesheet" href="styles/main.css">
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--navy); }
  .entry {
    text-align:center;
    animation: fadeUp .5s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .entry-eagle {
    width: 72px; height: 72px;
    margin: 0 auto 20px;
    filter: drop-shadow(0 6px 18px rgba(245,166,35,.3));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .entry-name {
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }
  .entry-name span { color: #F5A623; }
  .entry-sub {
    font-size: 10px;
    color: rgba(255,255,255,.35);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
  }
  .entry-spinner {
    width: 24px; height: 24px;
    border: 2px solid rgba(255,255,255,.15);
    border-top-color: #F5A623;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  .entry-msg { font-size: 12px; color: rgba(255,255,255,.35); }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,700&display=swap" rel="stylesheet">
</head>
<body>
<div class="entry">
  <img src="assets/logo1.webp"
       alt="Hermida Maia" class="entry-eagle" width="72" height="72">
  <div class="entry-name">HERMIDA<span> MAIA</span></div>
  <div class="entry-sub">Sociedade Individual de Advocacia</div>
  <div class="entry-spinner"></div>
  <div class="entry-msg" id="entry-msg">Verificando sessão...</div>
</div>

<script type="module">
import { AuthService } from './services/auth.js';

AuthService.isAuthenticated().then(auth => {
  document.getElementById('entry-msg').textContent =
    auth ? 'Carregando portal...' : 'Redirecionando...';
  setTimeout(() => {
    window.location.replace(auth ? 'pages/dashboard.html' : 'pages/login.html');
  }, 700);
});
</script>
</body>
</html>
