<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tenant Economics</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body class="theme-light">
  <main class="page-content" style="padding:24px;max-width:960px;margin:0 auto;">
    <h1 class="ds-h1">Meu Consumo e Limites</h1>
    <p class="ds-body" style="margin-top:8px;">Visao do tenant sobre uso, quotas e disponibilidade de upgrade.</p>

    <section class="status-cards-grid" style="margin-top:20px;">
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Plano</div><div class="status-card-value" id="tenant-plan">-</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Storage</div><div class="status-card-value" id="tenant-storage">-</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Usuarios</div><div class="status-card-value" id="tenant-users">-</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Status limites</div><div class="status-card-value" id="tenant-limit-state">-</div></div></article>
    </section>
  </main>

  <script type="module">
    const byId = (id) => document.getElementById(id);
    byId('tenant-plan').textContent = 'Starter';
    byId('tenant-storage').textContent = '0 / 2048 MB';
    byId('tenant-users').textContent = '0 / 5';
    byId('tenant-limit-state').textContent = 'OK';
  </script>
</body>
</html>
