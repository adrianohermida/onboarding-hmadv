<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Financial Intelligence Admin</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
  <main class="page-content" style="max-width:1080px;margin:0 auto;padding:24px;">
    <h1 class="ds-h1">Financial Intelligence Admin</h1>
    <p class="ds-body">Clientes críticos, agravamento, comprometimento, inadimplência e elegibilidade.</p>
    <section class="status-cards-grid" style="margin-top:20px;">
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Risco</div><div class="status-card-value" id="fi-risk">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Comprometimento</div><div class="status-card-value" id="fi-commitment">0%</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Inadimplência</div><div class="status-card-value" id="fi-inadimplencia">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Elegível</div><div class="status-card-value" id="fi-eligible">no</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Alertas</div><div class="status-card-value" id="fi-alerts">0</div></div></article>
    </section>
  </main>
  <script type="module">
    import { financialIntelligenceFoundation } from '../../financial-intelligence/FinancialIntelligenceFoundation.js';
    const s = financialIntelligenceFoundation.snapshot();
    document.getElementById('fi-risk').textContent = String(s.diagnosis?.score?.risk ?? 0);
    document.getElementById('fi-commitment').textContent = `${Math.round((s.commitment?.commitment_after_minimum || 0) * 100)}%`;
    document.getElementById('fi-inadimplencia').textContent = String(s.diagnosis?.score?.inadimplencia ?? 0);
    document.getElementById('fi-eligible').textContent = s.diagnosis?.eligibility?.eligible ? 'yes' : 'no';
    document.getElementById('fi-alerts').textContent = String(s.alerts?.total || 0);
  </script>
</body>
</html>
