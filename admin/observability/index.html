<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Observability</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
  <main class="page-content" style="max-width:1080px;margin:0 auto;padding:24px;">
    <h1 class="ds-h1">Observability Admin</h1>
    <p class="ds-body">Visibilidade global de runtime, tenants, workflows, uploads, incidentes e latencia.</p>
    <section class="status-cards-grid" style="margin-top:20px;">
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Runtime</div><div class="status-card-value" id="adm-runtime">healthy</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Tenants</div><div class="status-card-value" id="adm-tenants">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Workflows</div><div class="status-card-value" id="adm-workflows">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Incidentes abertos</div><div class="status-card-value" id="adm-incidents">0</div></div></article>
    </section>
  </main>
</body>
</html>
