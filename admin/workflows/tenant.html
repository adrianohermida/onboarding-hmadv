<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workflow Tenant View</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
  <main class="page-content" style="max-width:960px;margin:0 auto;padding:24px;">
    <h1 class="ds-h1">Meu Progresso de Workflow</h1>
    <p class="ds-body">Progresso, proximos passos, documentos pendentes, onboarding e plano.</p>
    <section class="status-cards-grid" style="margin-top:20px;">
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Progresso</div><div class="status-card-value">0%</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Proximos passos</div><div class="status-card-value">-</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Documentos pendentes</div><div class="status-card-value">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Onboarding</div><div class="status-card-value">-</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Plano</div><div class="status-card-value">-</div></div></article>
    </section>
  </main>
</body>
</html>
