<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workflow Operations Admin</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
  <main class="page-content" style="max-width:1100px;margin:0 auto;padding:24px;">
    <h1 class="ds-h1">Workflow Operations Admin</h1>
    <p class="ds-body">Monitoramento de workflows, gargalos, SLA, aprovacoes e tarefas vencidas.</p>
    <section class="status-cards-grid" style="margin-top:20px;">
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Workflows ativos</div><div class="status-card-value" id="wf-active">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">SLA vencido</div><div class="status-card-value" id="wf-sla-overdue">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Aprovacoes pendentes</div><div class="status-card-value" id="wf-approvals">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Tarefas vencidas</div><div class="status-card-value" id="wf-tasks-overdue">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Escalations abertas</div><div class="status-card-value" id="wf-escalations">0</div></div></article>
    </section>
  </main>
</body>
</html>
