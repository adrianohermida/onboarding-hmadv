<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Legal Operations Admin</title>
  <link rel="stylesheet" href="../../styles/main.css" />
</head>
<body>
  <main class="page-content" style="max-width:1080px;margin:0 auto;padding:24px;">
    <h1 class="ds-h1">Legal Operations Admin</h1>
    <p class="ds-body">Casos ativos, criticos, gargalos, SLA e produtividade operacional.</p>
    <section class="status-cards-grid" style="margin-top:20px;">
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Casos ativos</div><div class="status-card-value" id="loa-active">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Casos criticos</div><div class="status-card-value" id="loa-critical">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">SLA vencido</div><div class="status-card-value" id="loa-sla">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Backlog</div><div class="status-card-value" id="loa-backlog">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Onboarding parado</div><div class="status-card-value" id="loa-onboarding">0</div></div></article>
      <article class="status-card"><div class="status-card-body"><div class="status-card-label">Negociacao parada</div><div class="status-card-value" id="loa-negotiation">0</div></div></article>
    </section>
  </main>
  <script type="module">
    import { legalOperationsFoundation } from '../../legal-operations/LegalOperationsFoundation.js';
    const s = legalOperationsFoundation.snapshot();
    document.getElementById('loa-active').textContent = String(s.lifecycle?.active || 0);
    document.getElementById('loa-critical').textContent = String(s.monitoring?.critical_cases || 0);
    document.getElementById('loa-sla').textContent = String(s.sla?.overdue || 0);
    document.getElementById('loa-backlog').textContent = String(s.productivity?.open || 0);
    document.getElementById('loa-onboarding').textContent = String(s.monitoring?.onboarding_stalled || 0);
    document.getElementById('loa-negotiation').textContent = String(s.monitoring?.negotiation_stalled || 0);
  </script>
</body>
</html>
