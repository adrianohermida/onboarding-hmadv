name: Deploy Worker — hmadv-api

on:
  push:
    branches: [main]
    paths:
      - 'apps/edge-api/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy hmadv-api to Cloudflare
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Trust Git workspace
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Install root dependencies
        run: npm ci

      - name: Deploy Worker
        working-directory: apps/edge-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: b32bcc487dfca3a70fe57a75fa5ac482
        run: npx wrangler@4.94.0 deploy
