name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-storybook:
    timeout-minutes: 30
    env:
      CI: true
      STORYBOOK_DISABLE_TELEMETRY: 1
      SUPABASE_URL: https://sspvizogbcyigquqycsz.supabase.co
      SUPABASE_URL_MESSAGING: https://cundpbzqghmkohcozsex.supabase.co
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_ANON_KEY_MESSAGING: ${{ secrets.SUPABASE_ANON_KEY_MESSAGING }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Storybook
        run: npm run build-storybook

      - name: Prepare Login Entrypoint
        run: |
          mkdir -p storybook-static/login storybook-static/pages storybook-static/js storybook-static/design-system

          # Publica páginas do app e entrypoint amigável em /login
          cp pages/login.html storybook-static/pages/login.html
          cp pages/login.html storybook-static/login/index.html

          # Compatibilidade de nome de arquivo antigo/novo do auth manager
          cp js/auth-manager.js storybook-static/js/auth-manager.js

          # Publica diretórios necessários para as páginas do app
          for dir in admin pages js styles assets components design-system services shared utils; do
            if [ -d "$dir" ]; then
              mkdir -p "storybook-static/$dir"
              cp -r "$dir"/* "storybook-static/$dir/" 2>/dev/null || true
            fi
          done

          # Sanitiza secrets para evitar quebra de JS por quebras de linha/conteúdo acidental extra
          DEFAULT_KEY_SANITIZED="$(printf '%s' "$SUPABASE_ANON_KEY" | head -n1 | tr -d '\r')"
          MESSAGING_KEY_SANITIZED="$(printf '%s' "$SUPABASE_ANON_KEY_MESSAGING" | head -n1 | tr -d '\r')"

          # Injeta config runtime de Supabase com serialização segura (JSON.stringify)
          node -e '
            const fs = require("node:fs");
            const payload = {
              defaultUrl: process.env.SUPABASE_URL || "",
              defaultKey: process.env.DEFAULT_KEY_SANITIZED || "",
              messagingUrl: process.env.SUPABASE_URL_MESSAGING || "",
              messagingKey: process.env.MESSAGING_KEY_SANITIZED || ""
            };
            const js = `(function initRuntimeSupabaseConfig() {\n  window.__HM_SUPABASE__ = ${JSON.stringify(payload, null, 2)};\n})();\n`;
            fs.writeFileSync("storybook-static/js/runtime-config.js", js, "utf8");
          '

          cat > storybook-static/index.html << 'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Portal Hermida Maia</title>
            <meta http-equiv="refresh" content="0;url=/login/" />
            <script>
              window.location.replace('/login/');
            </script>
          </head>
          <body>
            <a href="/login/">Ir para login</a>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './storybook-static'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
