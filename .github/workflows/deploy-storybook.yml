name: Deploy Storybook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy-storybook:
    timeout-minutes: 30
    env:
      CI: true
      STORYBOOK_DISABLE_TELEMETRY: 1
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Storybook
        run: npm run build-storybook

      - name: Prepare Login Entrypoint
        run: |
          mkdir -p storybook-static/pages storybook-static/js storybook-static/design-system
          cp pages/login.html storybook-static/pages/login.html
          cp js/uth-manager.js storybook-static/js/auth-manager.js
          cp -r design-system/* storybook-static/design-system/
          cat > storybook-static/index.html << 'EOF'
          <!doctype html>
          <html lang="pt-BR">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>Portal Hermida Maia</title>
            <meta http-equiv="refresh" content="0;url=/pages/login.html" />
            <script>
              window.location.replace('/pages/login.html');
            </script>
          </head>
          <body>
            <a href="/pages/login.html">Ir para login</a>
          </body>
          </html>
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './storybook-static'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
