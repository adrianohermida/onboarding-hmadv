name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Supabase secrets
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRESHDESK_API_KEY: ${{ secrets.FRESHDESK_API_KEY }}
          FRESHDESK_DOMAIN: ${{ secrets.FRESHDESK_DOMAIN }}
          DIRECTDATA_TOKEN: ${{ secrets.DIRECTDATA_TOKEN }}
          AUTENTIQUE_WEBHOOK_SECRET_DOC: ${{ secrets.AUTENTIQUE_WEBHOOK_SECRET_DOC }}
          AUTENTIQUE_WEBHOOK_SECRET_SIGN: ${{ secrets.AUTENTIQUE_WEBHOOK_SECRET_SIGN }}
        run: |
          set -euo pipefail

          secrets_file="$(mktemp)"
          cleanup() {
            rm -f "$secrets_file"
          }
          trap cleanup EXIT

          add_secret() {
            local key="$1"
            local value="$2"
            if [ -n "${value}" ]; then
              printf '%s=%s\n' "$key" "$value" >> "$secrets_file"
            fi
          }

          add_secret RESEND_API_KEY "$RESEND_API_KEY"
          add_secret FRESHDESK_API_KEY "$FRESHDESK_API_KEY"
          add_secret FRESHDESK_DOMAIN "$FRESHDESK_DOMAIN"
          add_secret FRESHDESK_SUPPORT_EMAIL 'suporte@hermidamaia.adv.br'
          add_secret FROM_EMAIL 'Portal Hermida Maia <contato@hermidamaia.adv.br>'
          add_secret OFFICE_EMAIL 'contato@hermidamaia.adv.br'
          add_secret DIRECTDATA_TOKEN "$DIRECTDATA_TOKEN"
          add_secret AUTENTIQUE_WEBHOOK_SECRET_DOC "$AUTENTIQUE_WEBHOOK_SECRET_DOC"
          add_secret AUTENTIQUE_WEBHOOK_SECRET_SIGN "$AUTENTIQUE_WEBHOOK_SECRET_SIGN"

          if [ ! -s "$secrets_file" ]; then
            echo "No Supabase secrets to set."
            exit 0
          fi

          supabase secrets set --env-file "$secrets_file" --project-ref sspvizogbcyigquqycsz

      - name: Deploy freshdesk-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy freshdesk-proxy \
            --no-verify-jwt \
            --project-ref sspvizogbcyigquqycsz

      - name: Deploy portal-notify
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy portal-notify \
            --project-ref sspvizogbcyigquqycsz

      - name: Deploy directdata-proxy
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy directdata-proxy \
            --project-ref sspvizogbcyigquqycsz

      - name: Deploy portal-signature-webhook
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy portal-signature-webhook \
            --project-ref sspvizogbcyigquqycsz
