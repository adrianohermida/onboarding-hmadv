name: Deploy Supabase Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/supabase-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Set Supabase secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FRESHDESK_API_KEY: ${{ secrets.FRESHDESK_API_KEY }}
          FRESHDESK_DOMAIN: ${{ secrets.FRESHDESK_DOMAIN }}
          DIRECTDATA_TOKEN: ${{ secrets.DIRECTDATA_TOKEN }}
          AUTENTIQUE_WEBHOOK_SECRET_DOC: ${{ secrets.AUTENTIQUE_WEBHOOK_SECRET_DOC }}
          AUTENTIQUE_WEBHOOK_SECRET_SIGN: ${{ secrets.AUTENTIQUE_WEBHOOK_SECRET_SIGN }}
        run: |
          set -euo pipefail

          secrets_file="$(mktemp)"
          cleanup() {
            rm -f "$secrets_file"
          }
          trap cleanup EXIT

          {
            printf 'RESEND_API_KEY=%s\n' "$RESEND_API_KEY"
            printf 'FRESHDESK_API_KEY=%s\n' "$FRESHDESK_API_KEY"
            printf 'FRESHDESK_DOMAIN=%s\n' "$FRESHDESK_DOMAIN"
            printf 'FRESHDESK_SUPPORT_EMAIL=%s\n' 'suporte@hermidamaia.adv.br'
            printf 'FROM_EMAIL=%s\n' 'Portal Hermida Maia <contato@hermidamaia.adv.br>'
            printf 'OFFICE_EMAIL=%s\n' 'contato@hermidamaia.adv.br'
            printf 'DIRECTDATA_TOKEN=%s\n' "$DIRECTDATA_TOKEN"
            printf 'AUTENTIQUE_WEBHOOK_SECRET_DOC=%s\n' "$AUTENTIQUE_WEBHOOK_SECRET_DOC"
            printf 'AUTENTIQUE_WEBHOOK_SECRET_SIGN=%s\n' "$AUTENTIQUE_WEBHOOK_SECRET_SIGN"
          } > "$secrets_file"

          supabase secrets set --env-file "$secrets_file" --project-ref sspvizogbcyigquqycsz

      - name: Deploy portal-notify
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy portal-notify \
            --project-ref sspvizogbcyigquqycsz

      - name: Deploy freshdesk-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy freshdesk-proxy \
            --project-ref sspvizogbcyigquqycsz

      - name: Deploy directdata-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy directdata-proxy \
            --project-ref sspvizogbcyigquqycsz

      - name: Deploy portal-signature-webhook
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy portal-signature-webhook \
            --project-ref sspvizogbcyigquqycsz
