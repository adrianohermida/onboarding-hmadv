name: CI Platform Validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Validate module manifests
        run: node platform/scripts/validate-manifests.mjs

      - name: Validate shell compatibility
        run: node platform/scripts/validate-shell-compatibility.mjs
