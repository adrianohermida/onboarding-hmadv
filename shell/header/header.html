<header class="portal-header" role="banner">
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Recolher menu lateral" aria-expanded="true" title="Recolher menu">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
      <rect x="3" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.7"/>
      <path d="M8 4v12M11 8.5l3 2-3 2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div class="header-breadcrumb" id="header-breadcrumb" aria-label="Navegação">
    <strong id="header-page-title">Portal</strong>
  </div>

  <div class="header-actions">
    <div class="shell-mode-selector" id="shell-mode-selector" hidden></div>
    <button type="button" class="shell-action-btn" data-shell-action="global-search" aria-label="Busca global" title="Busca global">
      <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.6"/>
        <path d="m13.2 13.2 3.1 3.1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <button type="button" class="shell-action-btn" data-shell-action="workspace-panel" aria-label="Notificações" title="Notificações">
      <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <rect x="3" y="4" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/>
        <path d="M7 4V3h6v1M7 9h6M7 12h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
    <button type="button" class="shell-action-btn shell-notification-btn" data-shell-action="notifications-panel" aria-label="Notificações" title="Notificações">
      <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M6 8a4 4 0 0 1 8 0v3.5l1.5 2.5h-11L6 11.5V8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <path d="M8.5 16a1.7 1.7 0 0 0 3 0" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="shell-notification-dot" id="shell-notification-count" hidden>0</span>
    </button>
    <div class="header-user-shell" id="header-user-shell">
      <button type="button" class="header-user" id="header-user-trigger" data-shell-action="account-menu-toggle" aria-haspopup="menu" aria-expanded="false" title="Abrir menu da conta">
        <div class="header-avatar" id="header-avatar" aria-hidden="true">HM</div>
        <span class="header-user-meta">
          <span id="header-user-name" class="header-user-name" hidden>—</span>
          <span id="header-user-role" class="header-user-role" hidden>Conta</span>
        </span>
        <svg class="header-user-chevron" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="m6 8 4 4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="header-user-menu" id="header-user-menu" role="menu" aria-labelledby="header-user-trigger" hidden>
        <div class="header-user-menu-summary">
          <strong id="header-user-menu-name">Conta HMADV</strong>
          <span id="header-user-menu-email">usuario@hmadv.com</span>
        </div>
        <button type="button" class="header-user-menu-item" data-shell-action="open-account-modal" data-account-view="perfil" role="menuitem">Perfil</button>
        <button type="button" class="header-user-menu-item" data-shell-action="open-account-modal" data-account-view="conta" role="menuitem">Configuracoes da conta</button>
        <button type="button" class="header-user-menu-item" data-shell-action="open-account-modal" data-account-view="permissoes" role="menuitem">Permissoes</button>
        <button type="button" class="header-user-menu-item" data-shell-action="open-account-modal" data-account-view="preferencias" role="menuitem">Preferencias</button>
        <div class="header-user-menu-separator" aria-hidden="true"></div>
        <button type="button" class="header-user-menu-item header-user-menu-item-danger" data-shell-action="logout" role="menuitem">Sair</button>
      </div>
    </div>
  </div>
</header>
